asyncapi: "2.6.0"

info:
  title: UNI WebSocket API
  version: "1.0.0"
  description: >
    Bidirectional WebSocket protocol between the UNI Svelte frontend and
    the uWebSockets C++ backend. Every frame is a JSON object with at minimum
    an `action` field. Client-originated frames may carry an optional
    `request_id` that the server echoes back for request/response correlation.

servers:
  production:
    url: "wss://{host}"
    protocol: wss
    variables:
      host:
        default: localhost

# ---------------------------------------------------------------------------
# Channels
# ---------------------------------------------------------------------------
channels:
  /:
    description: The root WebSocket endpoint — all messages flow through here.
    subscribe:
      summary: Messages sent from the Server to the Client.
      message:
        oneOf:
          - $ref: "#/components/messages/Success"
          - $ref: "#/components/messages/Error"
          - $ref: "#/components/messages/LobbyList"
          - $ref: "#/components/messages/LobbyJoined"
          - $ref: "#/components/messages/LobbyUpdated"
          - $ref: "#/components/messages/LobbyLeft"
          - $ref: "#/components/messages/LobbyEvicted"
          - $ref: "#/components/messages/MatchStateUpdated"
          - $ref: "#/components/messages/MatchOver"
          - $ref: "#/components/messages/ChatMessage"

    publish:
      summary: Messages sent from the Client to the Server.
      message:
        oneOf:
          - $ref: "#/components/messages/MatchPlayCard"
          - $ref: "#/components/messages/MatchDrawCard"
          - $ref: "#/components/messages/MatchSubmitInput"
          - $ref: "#/components/messages/MatchCallUno"
          - $ref: "#/components/messages/MatchExit"
          - $ref: "#/components/messages/LobbyListRequest"
          - $ref: "#/components/messages/LobbyCreate"
          - $ref: "#/components/messages/LobbyJoin"
          - $ref: "#/components/messages/LobbyRejoin"
          - $ref: "#/components/messages/LobbyLeave"
          - $ref: "#/components/messages/LobbyPromote"
          - $ref: "#/components/messages/LobbyKick"
          - $ref: "#/components/messages/LobbyUpdateSettings"
          - $ref: "#/components/messages/LobbyStartMatch"
          - $ref: "#/components/messages/LobbyListSavedMatches"
          - $ref: "#/components/messages/LobbyDeleteSavedMatch"
          - $ref: "#/components/messages/LobbyResumeSavedMatch"
          - $ref: "#/components/messages/ChatSend"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # -------------------------------------------------------------------------
  # Messages
  # -------------------------------------------------------------------------
  messages:
    # --- Server → Client (payloads described inline — not code-generated) ---

    Success:
      name: success
      title: Generic Success
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["success"]
          request_id:
            type: string

    Error:
      name: error
      title: Generic Error
      payload:
        type: object
        required: [action, code]
        properties:
          action:
            type: string
            enum: ["error"]
          request_id:
            type: string
          code:
            type: string
            description: >
              A stable ErrorCode wire string (see x-enums/ErrorCode). The client
              maps it to a human-readable message; the backend never sends prose.
          detail:
            type: string
            description: >
              Optional supplementary context for the few dynamic errors (e.g. a
              payload parse message). Never the primary user-facing string.

    LobbyList:
      name: lobby_list
      title: Public Lobby List (server push)
      payload:
        type: object
        required: [action, lobbies]
        properties:
          action:
            type: string
            enum: ["lobby_list"]
          request_id:
            type: string
          lobbies:
            type: array
            items:
              type: object
              required: [invite_code, host, members, settings, name]
              properties:
                invite_code:
                  $ref: "#/components/schemas/LobbyCode"
                host:
                  $ref: "#/components/schemas/Username"
                name:
                  $ref: "#/components/schemas/LobbyName"
                members:
                  type: array
                  maxItems: 4
                  x-constants: { maxItems: MaxLobbyMembers }
                  items:
                    type: object
                    required: [username, is_bot]
                    properties:
                      username:
                        $ref: "#/components/schemas/Username"
                      is_bot:
                        type: boolean
                settings:
                  type: object

    LobbyJoined:
      name: lobby_joined
      title: Lobby Joined
      payload:
        type: object
        required: [action, lobby]
        properties:
          action:
            type: string
            enum: ["lobby_joined"]
          request_id:
            type: string
          lobby:
            type: object
            description: Full lobby state.
          available_rules:
            type: array
            description: List of rules supported by this server instance.
            items:
              type: object
              required: [id, label, description]
              properties:
                id:
                  type: string
                  description: Rule identifier used in active_mods.
                label:
                  type: string
                  description: Short human-readable name for UI display.
                description:
                  type: string
                  description: One-sentence explanation of the rule's effect.

    LobbyUpdated:
      name: lobby_updated
      title: Lobby State Broadcast
      payload:
        type: object
        required: [action, lobby]
        properties:
          action:
            type: string
            enum: ["lobby_updated"]
          lobby:
            type: object
            description: Full lobby state.

    LobbyLeft:
      name: lobby_left
      title: Successfully Left Lobby
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_left"]
          request_id:
            type: string

    LobbyEvicted:
      name: lobby_evicted
      title: Evicted — Lobby Closed
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_evicted"]
          reason:
            type: string

    MatchStateUpdated:
      name: match_state_updated
      title: Match State Broadcast
      payload:
        type: object
        required: [action, match_state]
        properties:
          action:
            type: string
            enum: ["match_state_updated"]
          match_state:
            type: object
            description: >
              Opaque per-player serialized match state produced by
              MatchInstance::SerializePlayerState(). Structure owned by the match engine.
          action_required:
            type: integer
            description: >
              Integer index of the Action enum value the server is waiting for.
              Present only when the server awaits a match_submit_input from this player.
              0 = ChooseType, 1 = PlayDrawn, 2 = ChooseTarget.
          action_context:
            type: object
            description: Additional context for the required action (e.g. available colours).

    MatchOver:
      name: match_over
      title: Match Ended
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["match_over"]
          winner:
            type: string
            description: Username of the winning player, or empty string if match was abandoned.
          reason:
            type: string

    ChatMessage:
      name: chat_message
      title: Incoming Chat Message
      payload:
        type: object
        required: [action, username, message]
        properties:
          action:
            type: string
            enum: ["chat_message"]
          username:
            $ref: "#/components/schemas/Username"
          message:
            type: string
            maxLength: 512

    # --- Client → Server (payloads reference components/schemas for code generation) ---

    MatchPlayCard:
      name: match_play_card
      title: Play a Card
      payload:
        $ref: "#/components/schemas/GamePlayCardPayload"

    MatchDrawCard:
      name: match_draw_card
      title: Draw a Card
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["match_draw_card"]
          request_id:
            type: string

    MatchSubmitInput:
      name: match_submit_input
      title: Submit Mandatory Input (e.g. colour choice)
      payload:
        $ref: "#/components/schemas/GameSubmitInputPayload"

    MatchCallUno:
      name: match_call_uno
      title: Declare UNO
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["match_call_uno"]
          request_id:
            type: string

    MatchExit:
      name: match_exit
      title: Exit Match
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["match_exit"]
          request_id:
            type: string

    LobbyListRequest:
      name: lobby_list
      title: Request Public Lobby List
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_list"]
          request_id:
            type: string

    LobbyCreate:
      name: lobby_create
      title: Create a Lobby
      payload:
        $ref: "#/components/schemas/LobbyCreatePayload"

    LobbyJoin:
      name: lobby_join
      title: Join a Lobby via Invite Code
      payload:
        $ref: "#/components/schemas/LobbyJoinPayload"

    LobbyRejoin:
      name: lobby_rejoin
      title: Rejoin After Disconnection
      payload:
        $ref: "#/components/schemas/LobbyRejoinPayload"

    LobbyLeave:
      name: lobby_leave
      title: Leave Current Lobby
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_leave"]
          request_id:
            type: string

    LobbyPromote:
      name: lobby_promote
      title: Hand Host Role to Another Player
      payload:
        $ref: "#/components/schemas/LobbyPromotePayload"

    LobbyKick:
      name: lobby_kick
      title: Kick a Player (Host Only)
      payload:
        $ref: "#/components/schemas/LobbyKickPayload"

    LobbyUpdateSettings:
      name: lobby_update_settings
      title: Update Lobby Settings (Host Only)
      payload:
        $ref: "#/components/schemas/LobbyUpdateSettingsPayload"

    LobbyStartMatch:
      name: lobby_start_match
      title: Start the Match
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_start_match"]
          request_id:
            type: string

    LobbyListSavedMatches:
      name: lobby_list_saved_matches
      title: List Saved Matches for the Group
      payload:
        type: object
        properties:
          action:
            type: string
            enum: ["lobby_list_saved_matches"]
          request_id:
            type: string

    LobbyDeleteSavedMatch:
      name: lobby_delete_saved_match
      title: Delete a Saved Match
      payload:
        $ref: "#/components/schemas/LobbyDeleteSavedMatchPayload"

    LobbyResumeSavedMatch:
      name: lobby_resume_saved_match
      title: Resume a Saved Match
      payload:
        $ref: "#/components/schemas/LobbyResumeSavedMatchPayload"

    ChatSend:
      name: chat_send
      title: Send a Chat Message
      payload:
        $ref: "#/components/schemas/ChatSendPayload"

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  # Only client → server payload schemas live here; they are used for C++ code
  # generation via hatchbed/asyncapi_gencpp. Server response payloads are
  # described inline in their message definitions above.
  #
  # Constraint schemas (Username, Password, etc.) are included for frontend
  # Zod generation (Phase 3) and are referenced by the payload schemas below.
  # -------------------------------------------------------------------------
  schemas:
    # --- Constraint schemas (single source of truth for validation limits) ---
    # These limits are code-generated into both ends — never hand-edit the
    # mirrors. Backend: scripts/generate_contract_hpp.py -> common/contract.hpp
    # (contract::k...). Frontend: scripts/generate-schemas.js -> schemas.ts.

    Username:
      type: string
      minLength: 3
      maxLength: 32
      pattern: "^[a-zA-Z0-9_]+$"
      x-constants: { minLength: UsernameMin, maxLength: UsernameMax }

    PlayerRef:
      type: string
      minLength: 1
      maxLength: 100

    Password:
      type: string
      minLength: 8
      x-constants: { minLength: PasswordMin }

    LobbyName:
      type: string
      minLength: 1
      maxLength: 50
      x-constants: { maxLength: LobbyNameMax }

    LobbyCode:
      type: string
      minLength: 6
      maxLength: 6
      pattern: "^[A-Z0-9]+$"
      x-constants: { minLength: LobbyCodeLen }

    # --- Client → Server payload schemas (C++ structs generated from these) ---
    # Fields 'action' and 'request_id' are envelope fields handled by the router
    # and are intentionally excluded from these struct definitions.

    GamePlayCardPayload:
      type: object
      required:
        - card_id
      properties:
        card_id:
          type: integer
          minimum: 0
          maximum: 65535
          description: Numeric identifier of the card to play (maps to uint16_t on the wire).

    GameSubmitInputPayload:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: >
            The player's response to a mandatory game prompt, encoded as a string.
            Semantics depend on the pending Action:
              - ChooseType (0): integer string "0"–"3" mapping to the Type enum (Red=0, Blue=1, Green=2, Yellow=3).
              - PlayDrawn (1): "0" = play the drawn card, "1" = keep it.
              - ChooseTarget (2): the target player's username string.

    LobbyCreatePayload:
      type: object
      properties:
        is_public:
          type: boolean
        name:
          $ref: "#/components/schemas/LobbyName"

    LobbyJoinPayload:
      type: object
      required:
        - code
      properties:
        code:
          $ref: "#/components/schemas/LobbyCode"

    LobbyRejoinPayload:
      type: object
      required:
        - code
      properties:
        code:
          $ref: "#/components/schemas/LobbyCode"

    LobbyPromotePayload:
      type: object
      required:
        - username
      properties:
        username:
          $ref: "#/components/schemas/PlayerRef"

    LobbyKickPayload:
      type: object
      required:
        - username
      properties:
        username:
          $ref: "#/components/schemas/PlayerRef"

    LobbyUpdateSettingsPayload:
      type: object
      properties:
        is_public:
          type: boolean
        name:
          $ref: "#/components/schemas/LobbyName"
        bot_count:
          type: integer
          minimum: 0
          maximum: 3
          x-constants: { minimum: BotCountMin, maximum: BotCountMax }
        turn_time_limit_ms:
          type: integer
          minimum: 3000
          maximum: 120000
          description: Turn time limit in milliseconds.
          x-constants: { minimum: TurnTimeMinMs, maximum: TurnTimeMaxMs }
        allow_bot_takeover:
          type: boolean
        allow_bot_replacement:
          type: boolean
        save_state:
          type: boolean
        quit_deletes_match:
          type: boolean
        bot_mode:
          type: integer
          minimum: 0
          maximum: 1
          x-constants: { minimum: BotModeMin, maximum: BotModeMax }
        starting_cards:
          type: integer
          minimum: 2
          maximum: 20
          x-constants: { minimum: StartingCardsMin, maximum: StartingCardsMax }
        active_mods:
          type: array
          items:
            type: string

    LobbyDeleteSavedMatchPayload:
      type: object
      required:
        - match_id
      properties:
        match_id:
          type: string

    LobbyResumeSavedMatchPayload:
      type: object
      required:
        - match_id
      properties:
        match_id:
          type: string

    ChatSendPayload:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 512

  # -------------------------------------------------------------------------
  # Enum definitions (shared between backend and frontend)
  # -------------------------------------------------------------------------
  # These are emitted by generate-schemas.js as TypeScript `as const` objects.
  # The C++ backend maps these values to its own `k`-prefixed enumerators
  # (e.g. Type::kRed = 0 <-> Type.Red = 0).
  # -------------------------------------------------------------------------
  x-enums:
    Type:
      description: Card type category (formerly Color). Transmitted as an integer index.
      values:
        Red:    { value: 0, display: "red" }
        Blue:   { value: 1, display: "blue" }
        Green:  { value: 2, display: "green" }
        Yellow: { value: 3, display: "yellow" }
        White:  { value: 4, display: "white" }

    Value:
      description: Card face value. Transmitted as an integer index.
      values:
        "0":        { value: 0,  display: "0" }
        "1":        { value: 1,  display: "1" }
        "2":        { value: 2,  display: "2" }
        "3":        { value: 3,  display: "3" }
        "4":        { value: 4,  display: "4" }
        "5":        { value: 5,  display: "5" }
        "6":        { value: 6,  display: "6" }
        "7":        { value: 7,  display: "7" }
        "8":        { value: 8,  display: "8" }
        "9":        { value: 9,  display: "9" }
        Skip:       { value: 10, display: "skip" }
        Reverse:    { value: 11, display: "reverse" }
        Draw2:      { value: 12, display: "+2" }
        Jolly:      { value: 13, display: "jolly" }
        JollyDraw4: { value: 14, display: "jolly_draw4" }

    Action:
      description: Input action the server is waiting for. Transmitted as an integer via action_required.
      values:
        ChooseType: 0
        PlayDrawn: 1
        ChooseTarget: 2

    ErrorCode:
      description: >
        Stable error identifiers carried in the `code` field of an error frame.
        The backend never sends user-facing prose; the frontend maps each code
        to a human-readable message. Transmitted as the snake_case wire string.
      values:
        InvalidPayload: invalid_payload
        RateLimited: rate_limited
        InvalidMove: invalid_move
        CannotDraw: cannot_draw
        NotInLobby: not_in_lobby
        AlreadyInLobby: already_in_lobby
        AlreadyMember: already_member
        LobbyNotFound: lobby_not_found
        LobbyFull: lobby_full
        LobbyExpired: lobby_expired
        NotHost: not_host
        NotEnoughPlayers: not_enough_players
        MatchAlreadyStarted: match_already_started
        JoinDisabledInMatch: join_disabled_in_match
        UserNotInLobby: user_not_in_lobby
        CannotKickSelf: cannot_kick_self
        CannotPromoteBot: cannot_promote_bot
        SavedMatchNotFound: saved_match_not_found
        InternalError: internal_error
