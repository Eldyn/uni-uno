<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="google-site-verification" content="pi5b9DDctNKSXtVT0-SsWRSCD_qtU-P-6EtLow_a5Rg" />
		<link rel="icon" type="image/x-icon" href="/back.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>UNI</title>

		<!-- Primary meta -->
		<meta name="description" content="UNI — free online multiplayer card game. Play with friends in real time, up to 4 players." />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph (Discord, WhatsApp, Slack, Facebook) -->
		<meta property="og:title" content="UNI" />
		<meta property="og:description" content="Free online multiplayer card game. Play with friends in real time, up to 4 players." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://unii.duckdns.org" />
		<meta property="og:image" content="https://unii.duckdns.org/assets/bg_main.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="UNI" />
		<meta name="twitter:description" content="Free online multiplayer card game. Play with friends in real time, up to 4 players." />
		<meta name="twitter:image" content="https://unii.duckdns.org/assets/bg_main.png" />

		<!-- Structured data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "WebApplication",
			"name": "UNI",
			"url": "https://unii.duckdns.org",
			"description": "Free online multiplayer card game for up to 4 players.",
			"applicationCategory": "Game",
			"operatingSystem": "Web"
		}
		</script>

		<!-- Preload the fonts so the browser fetches them in parallel with the CSS
         instead of waiting to discover them in @font-face. crossorigin is
         required even same-origin: fonts are always fetched in anonymous mode,
         and a preload without it would not match the later font request. -->
		<link rel="preload" href="/fonts/JetBrainsMono.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/pixel.woff2" as="font" type="font/woff2" crossorigin />
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.js"></script>
	</body>
</html>
